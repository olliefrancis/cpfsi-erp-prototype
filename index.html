<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPFSI Prototypes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1f2937;
      --border: #d1d5db;
      --link: #0b5fff;
      --link-hover: #003fbf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 760px;
      margin: 56px auto;
      padding: 0 20px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
      line-height: 1.2;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .prototype-link {
      display: block;
      text-decoration: none;
      font-weight: 600;
      color: var(--link);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 120ms ease, transform 120ms ease;
    }

    .prototype-link:hover {
      border-color: var(--link);
      color: var(--link-hover);
      text-decoration: underline;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>CPFSI Prototypes</h1>

    <ul>
      <li><a class="prototype-link" href="/v1/">V1</a></li>
      <li><a class="prototype-link" href="/v2/">V2</a></li>
    </ul>
  </main>
</body>
</html>
