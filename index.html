<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPFSI Prototypes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f2f1;
      --card: #ffffff;
      --text: #0b0c0c;
      --muted: #505a5f;
      --border: #b1b4b6;
      --link: #1d70b8;
      --link-hover: #003078;
      --green: #00703c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 760px;
      margin: 56px auto;
      padding: 0 20px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
      line-height: 1.2;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .prototype-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 16px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    a.prototype-card:hover {
      border-color: var(--link);
      box-shadow: 0 2px 8px rgba(11, 12, 12, 0.08);
    }

    a.prototype-card:hover .prototype-version {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .prototype-version {
      grid-row: 1 / 4;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--link);
      letter-spacing: -0.02em;
    }

    .prototype-audience {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--muted);
    }

    .prototype-card--current .prototype-audience {
      color: var(--green);
    }

    .prototype-purpose {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .prototype-updated {
      font-size: 0.8125rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .prototype-updated time {
      font-weight: 600;
      color: var(--text);
    }

  </style>
</head>
<body>
  <main>
    <h1>CPFSI Prototypes</h1>

    <ul>
      <li>
        <a class="prototype-card prototype-card--current" href="/v1/">
          <span class="prototype-version">V1</span>
          <span class="prototype-audience">Current version</span>
          <span class="prototype-purpose">For review and feedback.</span>
          <span class="prototype-updated" data-build="v1"></span>
        </a>
      </li>
      <li>
        <a class="prototype-card" href="/v2/">
          <span class="prototype-version">V2</span>
          <span class="prototype-audience">Next version with CPINs and responsive layouts.</span>
          <span class="prototype-purpose">For review and feedback</span>
          <span class="prototype-updated" data-build="v2"></span>
        </a>
      </li>
    </ul>
  </main>
  <script>
    // BUILD_STAMPS — update whenever you change the prototype (see .cursor/rules/prototype-build-stamps.mdc).
    const BUILD_STAMPS = {
      v1: '4 Jun 2026, 14:31',
      v2: '8 Jun 2026, 13:48'
    };

    document.querySelectorAll('[data-build]').forEach(function (el) {
      const stamp = BUILD_STAMPS[el.dataset.build];
      if (!stamp) return;
      el.innerHTML = 'Updated <time datetime="' + stampToDatetime(stamp) + '">' + stamp + '</time>';
    });

    function stampToDatetime(stamp) {
      const m = stamp.match(/^(\d{1,2})\s+(\w+)\s+(\d{4}),\s*(\d{1,2}):(\d{2})$/);
      if (!m) return '';
      const months = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06',
        Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };
      const mon = months[m[2]] || '01';
      const day = m[1].padStart(2, '0');
      const hour = m[4].padStart(2, '0');
      return m[3] + '-' + mon + '-' + day + 'T' + hour + ':' + m[5];
    }
  </script>
</body>
</html>
